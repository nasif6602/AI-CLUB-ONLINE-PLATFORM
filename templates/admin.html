<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel – AI Club</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="toast-container"></div>

    <nav style="background:var(--bg-secondary);padding:12px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;">
        <a href="/" style="text-decoration:none;color:var(--text-primary);font-weight:700;">← Back to AI Club</a>
        <span style="flex:1;"></span>
        <span id="admin-user-info" style="color:var(--text-secondary);"></span>
        <button class="btn btn-ghost btn-sm" onclick="handleLogout()">🚪 Logout</button>
    </nav>

    <div style="max-width:1000px;margin:0 auto;padding:32px 20px;">
        <div class="section-header" style="margin-bottom:24px;">
            <h1 class="section-title">⚙️ Admin Panel</h1>
        </div>

        <!-- Stats Overview -->
        <div class="grid grid-3" style="margin-bottom:24px;">
            <div class="card stat-card"><div class="stat-value" id="admin-stat-members">0</div><div class="stat-label">Members</div></div>
            <div class="card stat-card"><div class="stat-value" id="admin-stat-events">0</div><div class="stat-label">Events</div></div>
            <div class="card stat-card"><div class="stat-value" id="admin-stat-projects">0</div><div class="stat-label">Projects</div></div>
        </div>

        <!-- Membership Requests Card -->
        <div class="card">
            <h3 style="margin-bottom:16px;">💳 Pending Membership Requests</h3>
            <div id="admin-membership-requests">
                <p style="color:var(--text-muted);">Loading...</p>
            </div>
        </div>
    </div>

    <div id="modal-container"></div>

    <script src="{{ url_for('static', filename='js/supabase-config.js') }}"></script>
    <script src="{{ url_for('static', filename='js/utils.js') }}"></script>
    <script src="{{ url_for('static', filename='js/admin-page.js') }}"></script>
</body>
</html>
